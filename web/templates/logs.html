{% extends "base.html" %}
{% block title %}Logs{% endblock %}
{% block topbar_title %}System Logs{% endblock %}

{% block head %}
<style>
/* Log viewer */
.log-toolbar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 14px;
}
.log-viewer {
  background: #0d1117;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0;
  overflow: hidden;
  font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
  font-size: 12px;
  line-height: 1.6;
}
.log-viewer-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 14px;
  background: #161b22;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-muted);
}
.log-body {
  overflow-y: auto;
  max-height: calc(100vh - 280px);
  min-height: 300px;
  padding: 10px 0;
}
.log-line {
  display: flex;
  gap: 0;
  padding: 1px 14px;
  border-left: 3px solid transparent;
  transition: background 0.1s;
}
.log-line:hover {
  background: rgba(255,255,255,0.04);
}
.log-ts   { color: #555; min-width: 158px; flex-shrink: 0; }
.log-lvl  { min-width: 80px; flex-shrink: 0; font-weight: 600; }
.log-name { color: #7b9ebe; min-width: 180px; flex-shrink: 0; }
.log-msg  { color: #cdd9e5; word-break: break-word; }

/* Level colours */
.log-line.lvl-debug  { border-left-color: #444; }
.log-line.lvl-debug  .log-lvl { color: #6e7681; }
.log-line.lvl-info   { border-left-color: #1f6feb; }
.log-line.lvl-info   .log-lvl { color: #58a6ff; }
.log-line.lvl-warning{ border-left-color: #d29922; }
.log-line.lvl-warning .log-lvl{ color: #e3b341; }
.log-line.lvl-error  { border-left-color: #da3633; background: rgba(218,54,51,0.07); }
.log-line.lvl-error  .log-lvl { color: #f85149; }
.log-line.lvl-critical{ border-left-color: #ff0000; background: rgba(255,0,0,0.12); }
.log-line.lvl-critical .log-lvl { color: #ff6347; font-weight: 800; }

/* Level filter buttons */
.level-btn {
  padding: 4px 12px;
  border-radius: 5px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text-secondary);
  font-size: 11px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.4px;
}
.level-btn:hover { background: var(--bg-hover); }
.level-btn.active-debug    { background:#222; color:#aaa; border-color:#555; }
.level-btn.active-info     { background:#0d1f38; color:#58a6ff; border-color:#1f6feb; }
.level-btn.active-warning  { background:#2a1f00; color:#e3b341; border-color:#d29922; }
.level-btn.active-error    { background:#2a0e0e; color:#f85149; border-color:#da3633; }
.level-btn.active-critical { background:#3d0000; color:#ff6347; border-color:#ff0000; }

/* Runtime level selector */
.runtime-level-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 12px;
  color: var(--text-secondary);
}
.runtime-level-row select {
  background: var(--bg-card);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 4px 8px;
  font-size: 12px;
}
.log-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
  font-size: 13px;
}
.auto-badge {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 10px;
  background: var(--bg-card);
  border: 1px solid var(--border);
  color: var(--text-muted);
  cursor: pointer;
  user-select: none;
}
.auto-badge.on {
  background: rgba(31,111,235,0.15);
  border-color: #1f6feb;
  color: #58a6ff;
}
</style>
{% endblock %}

{% block content %}
<!-- Toolbar -->
<div class="log-toolbar">

  <!-- Level filter (what to SHOW) -->
  <span style="font-size:11px;color:var(--text-muted);margin-right:2px">Show:</span>
  <button class="level-btn" data-filter="DEBUG"    onclick="setFilter('DEBUG')">ALL</button>
  <button class="level-btn" data-filter="INFO"     onclick="setFilter('INFO')">INFO+</button>
  <button class="level-btn" data-filter="WARNING"  onclick="setFilter('WARNING')">WARN+</button>
  <button class="level-btn" data-filter="ERROR"    onclick="setFilter('ERROR')">ERROR+</button>

  <div style="width:1px;height:22px;background:var(--border);margin:0 4px"></div>

  <!-- Log file selector -->
  <select id="file-select" style="background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:12px" onchange="loadLogs()">
    <option value="">Today's log</option>
  </select>

  <!-- Lines selector -->
  <select id="lines-select" style="background:var(--bg-card);color:var(--text-primary);border:1px solid var(--border);border-radius:5px;padding:4px 8px;font-size:12px" onchange="loadLogs()">
    <option value="200">200 lines</option>
    <option value="500" selected>500 lines</option>
    <option value="1000">1000 lines</option>
    <option value="2000">2000 lines</option>
    <option value="5000">5000 lines</option>
  </select>

  <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
    <!-- Auto-refresh -->
    <span class="auto-badge" id="auto-badge" onclick="toggleAuto()">⟳ Auto-refresh: OFF</span>

    <!-- Runtime log level (what to WRITE to file) -->
    <div class="runtime-level-row">
      <span>Write level:</span>
      <select id="runtime-level" onchange="setRuntimeLevel(this.value)">
        <option value="DEBUG">DEBUG (very verbose)</option>
        <option value="INFO" selected>INFO</option>
        <option value="WARNING">WARNING</option>
        <option value="ERROR">ERROR only</option>
        <option value="CRITICAL">CRITICAL only</option>
      </select>
    </div>

    <button class="btn btn-secondary btn-sm" onclick="loadLogs()">↻ Refresh</button>
    <button class="btn btn-secondary btn-sm" onclick="downloadLog()">⬇ Download</button>
  </div>
</div>

<!-- Log viewer -->
<div class="log-viewer">
  <div class="log-viewer-header">
    <span id="log-file-label">logs/mlb.log</span>
    <span id="log-count-label">— entries</span>
  </div>
  <div class="log-body" id="log-body">
    <div class="log-empty">Loading logs…</div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/logs.js"></script>
{% endblock %}
